name: full-e2e-test
description: Comprehensive end-to-end test — every feature, every page, every import type
default_delay: 400

actions:
  # ═══════════════════════════════════════════════════════
  # PHASE 1: App startup — verify all pages load
  # ═══════════════════════════════════════════════════════
  - type: Wait
    value: "2000"
  - type: Screenshot
    value: e2e-01-startup

  # Navigate every page
  - type: Navigate
    value: resume
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-02-resume-empty

  - type: Navigate
    value: mydata
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-03-mydata-empty

  - type: Navigate
    value: jobs
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-04-jobs

  - type: Navigate
    value: search
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-05-search

  - type: Navigate
    value: apply
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-06-apply

  - type: Navigate
    value: pipeline
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-07-pipeline

  - type: Navigate
    value: profile
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-08-profile-top

  - type: Scroll
    value: bottom
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-09-profile-bottom

  - type: Navigate
    value: help
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-10-help

  # ═══════════════════════════════════════════════════════
  # PHASE 2: DOCX resume import + Morph preview
  # ═══════════════════════════════════════════════════════
  - type: Navigate
    value: resume
  - type: Wait
    value: "300"

  - type: ImportFile
    value: test-data/resumes/Scott_Galloway_CTO.docx
  - type: Wait
    value: "5000"
  - type: Screenshot
    value: e2e-11-docx-import

  # Scroll through resume page
  - type: Scroll
    value: "30%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-12-resume-skills

  - type: Scroll
    value: "60%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-13-resume-experience

  - type: Scroll
    value: bottom
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-14-resume-bottom

  # ═══════════════════════════════════════════════════════
  # PHASE 3: LinkedIn import
  # ═══════════════════════════════════════════════════════
  - type: Scroll
    value: top
  - type: Wait
    value: "300"

  - type: ImportFile
    value: /Users/scottgalloway/Downloads/Basic_LinkedInDataExport_04-07-2026.zip.zip
  - type: Wait
    value: "3000"
  - type: Screenshot
    value: e2e-15-linkedin-import

  - type: Scroll
    value: "40%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-16-linkedin-skills

  - type: Scroll
    value: "70%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-17-linkedin-experience

  # ═══════════════════════════════════════════════════════
  # PHASE 4: My Data page with imported data
  # ═══════════════════════════════════════════════════════
  - type: Navigate
    value: mydata
  - type: Wait
    value: "2000"
  - type: Screenshot
    value: e2e-18-mydata-personal

  - type: Scroll
    value: "20%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-19-mydata-ledger-top

  - type: Scroll
    value: "40%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-20-mydata-ledger-mid

  - type: Scroll
    value: "60%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-21-mydata-experience

  - type: Scroll
    value: "80%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-22-mydata-projects

  - type: Scroll
    value: bottom
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-23-mydata-issues

  # ═══════════════════════════════════════════════════════
  # PHASE 5: Add a job and check matching
  # ═══════════════════════════════════════════════════════
  - type: Navigate
    value: search
  - type: Wait
    value: "500"

  - type: Navigate
    value: jobs
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-24-jobs-list

  # Paste a job description
  - type: Navigate
    value: apply
  - type: Wait
    value: "500"
  - type: PasteJob
    value: "Senior .NET Developer — Remote. We are looking for an experienced C# developer with ASP.NET Core, Docker, Kubernetes, and Azure experience. Must have 5+ years of .NET development. Experience with microservices, Redis, and SQL Server preferred."
  - type: Wait
    value: "3000"
  - type: Screenshot
    value: e2e-25-job-pasted

  # ═══════════════════════════════════════════════════════
  # PHASE 6: Profile page — GitHub import card
  # ═══════════════════════════════════════════════════════
  - type: Navigate
    value: profile
  - type: Wait
    value: "500"
  - type: Screenshot
    value: e2e-26-profile-identity

  - type: Scroll
    value: "50%"
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-27-profile-github

  - type: Scroll
    value: bottom
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-28-profile-ai

  # ═══════════════════════════════════════════════════════
  # PHASE 7: Final navigation sweep — all pages still work
  # ═══════════════════════════════════════════════════════
  - type: Navigate
    value: resume
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-29-final-resume

  - type: Navigate
    value: mydata
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-30-final-mydata

  - type: Navigate
    value: jobs
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-31-final-jobs

  - type: Navigate
    value: pipeline
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-32-final-pipeline

  - type: Navigate
    value: help
  - type: Wait
    value: "400"
  - type: Screenshot
    value: e2e-33-final-help
