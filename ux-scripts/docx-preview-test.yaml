name: docx-preview-test
description: Test DOCX preview via Morph — import a Word resume and verify page images render
default_delay: 500

actions:
  - type: Wait
    value: "2000"

  # Import a DOCX resume
  - type: ImportFile
    value: test-data/resumes/Scott_Galloway_CTO.docx
  - type: Wait
    value: "5000"
  - type: Screenshot
    value: docx-preview-page1

  # Check if page navigation works
  - type: Scroll
    value: top
  - type: Wait
    value: "500"
  - type: Screenshot
    value: docx-preview-top

  - type: Scroll
    value: "50%"
  - type: Wait
    value: "500"
  - type: Screenshot
    value: docx-preview-mid

  - type: Scroll
    value: bottom
  - type: Wait
    value: "500"
  - type: Screenshot
    value: docx-preview-bottom
