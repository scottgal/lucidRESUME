name: CI - Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore lucidRESUME.sln

      - name: Build
        run: dotnet build lucidRESUME.sln -c Release --no-restore

      - name: Test
        run: dotnet test lucidRESUME.sln -c Release --no-build --filter "FullyQualifiedName!~MigrateFromJson" --verbosity normal
