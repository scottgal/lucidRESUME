name: Publish Mostlylucid.Avalonia.UITesting to NuGet

on:
  push:
    tags:
      - 'uitesting-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: read
  id-token: write  # Required for NuGet trusted publishing

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT: src/Mostlylucid.Avalonia.UITesting/Mostlylucid.Avalonia.UITesting.csproj

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: nuget  # NuGet trusted publishing environment

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag: uitesting-v1.0.1 → 1.0.1
            echo "VERSION=${GITHUB_REF_NAME#uitesting-v}" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT }} -c Release --no-restore

      - name: Pack
        run: dotnet pack ${{ env.PROJECT }} -c Release --no-build -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Get NuGet OIDC token
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api://AzureADTokenExchange');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Push to NuGet (trusted publishing)
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ steps.nuget-token.outputs.token }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkgs/*.nupkg
